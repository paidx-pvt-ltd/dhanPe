name: Security and Code Quality

on:
  pull_request:
    branches: [develop, staging, main]
  push:
    branches: [develop, staging, main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkmarx AST Github Action
        uses: Checkmarx/ast-github-action@c52fa63dbd4916520882e10456d66ff4dd7bf754
        with:
          base_uri: https://ind.ast.checkmarx.net
          cx_tenant: ama-partners
          cx_client_id: dhruv-integrations
          cx_client_secret: ${{ secrets.CX_CLIENT_SECRET }}
          project_name: manual-financeapp
          additional_params: --threshold "sast-critical=1; sast-high=1; sca-critical=1; iac-security-critical=1"

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Format check
        working-directory: backend
        run: npm run format:check

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit
