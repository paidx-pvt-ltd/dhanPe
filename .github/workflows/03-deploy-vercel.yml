name: Deploy to Vercel

on:
  push:
    branches:
      - develop
      - staging
      - main
    paths:
      - 'backend/**'
      - 'vercel.json'

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    name: Deploy to Dev
    environment:
      name: development
      url: https://dev.dhanpe.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # NOTE: These must be actions, not workflows
      - name: Run security and quality checks
        uses: ./.github/actions/security-and-lint

      - name: Run tests and build
        uses: ./.github/actions/test-and-build

      - name: Deploy to Vercel (Dev)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
        run: |
          npm install -g vercel
          vercel deploy --token $VERCEL_TOKEN
        working-directory: ./backend

      - name: Dev deployment successful
        run: echo "Development deployed to dev.dhanpe.com"

  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    name: Deploy to Staging
    environment:
      name: staging
      url: https://staging.dhanpe.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security and quality checks
        uses: ./.github/actions/security-and-lint

      - name: Run tests and build
        uses: ./.github/actions/test-and-build

      - name: Deploy to Vercel (Staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
        run: |
          npm install -g vercel
          vercel deploy --token $VERCEL_TOKEN
        working-directory: ./backend

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # npm run test:smoke -- https://staging.dhanpe.com

      - name: Staging deployment successful
        run: echo "Staging deployed to staging.dhanpe.com"

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    name: Deploy to Production
    environment:
      name: production
      url: https://api.dhanpe.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security and quality checks
        uses: ./.github/actions/security-and-lint

      - name: Run tests and build
        uses: ./.github/actions/test-and-build

      - name: Production deployment initiated
        run: |
          echo "Production deployment approved"
          echo "This will go live to api.dhanpe.com"
          echo "Deployment starts now..."

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
        run: |
          npm install -g vercel
          vercel deploy --prod --token $VERCEL_TOKEN
        working-directory: ./backend

      - name: Run production smoke tests
        run: |
          echo "Running smoke tests against production..."

      - name: Production deployment successful
        run: |
          echo "LIVE: Deployed to api.dhanpe.com"

      - name: Notify team
        run: |
          echo "Production deployment complete"
          echo "Health Check: https://api.dhanpe.com/health"
          echo "To rollback: run workflow with rollback flag"
