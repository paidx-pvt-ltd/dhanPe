name: Backend CI

on:
  pull_request:
    branches: [develop, staging, main]
    paths:
      - 'backend/**'
      - '.github/workflows/01-backend-ci.yml'
      - '.github/workflows/03-deploy-vercel.yml'

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Checkmarx AST Github Action
        uses: Checkmarx/ast-github-action@c52fa63dbd4916520882e10456d66ff4dd7bf754
        with:
          base_uri: https://ind.ast.checkmarx.net
          cx_tenant: ama-partners
          cx_client_id: dhruv-integrations
          cx_client_secret: ${{ secrets.CX_CLIENT_SECRET }}
          project_name: manual-financeapp
          #additional_params: --threshold "sast-critical=1; sast-high=1; sca-critical=1; iac-security-critical=1" --async
          additional_params: --async

  quality-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ github.run_id }}
          POSTGRES_DB: dhanpe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            sleep 3
          done

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Format check
        working-directory: backend
        run: npm run format:check

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Setup DB
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:${{ github.run_id }}@localhost:5432/dhanpe_test
          DIRECT_URL: postgresql://postgres:${{ github.run_id }}@localhost:5432/dhanpe_test
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:${{ github.run_id }}@localhost:5432/dhanpe_test
          DIRECT_URL: postgresql://postgres:${{ github.run_id }}@localhost:5432/dhanpe_test
          NODE_ENV: test
        run: npm run test

      - name: Coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:${{ github.run_id }}@localhost:5432/dhanpe_test
          DIRECT_URL: postgresql://postgres:${{ github.run_id }}@localhost:5432/dhanpe_test
        run: npm run test:coverage

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Verify build
        working-directory: backend
        run: test -d dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist
