name: 🧪 Tests & Build Verification

on:
  pull_request:
    branches: [develop, staging, main]
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  push:
    branches: [develop, staging, main]
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: dhanpe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            sleep 3
          done

      - name: Setup DB
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dhanpe_test
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dhanpe_test
          NODE_ENV: test
        run: npm run test

      - name: Coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dhanpe_test
        run: npm run test:coverage

      - name: Build
        working-directory: backend
        run: npm run build

      - name: 📦 Check build output
        working-directory: ./backend
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not created"
            exit 1
          fi
          echo "✅ Build successful"

  # GATE: Fail if tests or build fail
  build-gate:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: failure()
    steps:
      - name: ❌ Build/Test gate failed
        run: |
          echo "❌ Tests or build verification failed"
          echo "   → Fix failing tests: npm run test"
          echo "   → Fix build errors: npm run build"
          exit 1
