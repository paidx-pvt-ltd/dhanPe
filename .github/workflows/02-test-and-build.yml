name: 🧪 Tests & Build Verification

on:
  pull_request:
    branches: [develop, staging, main]
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  push:
    branches: [develop, staging, main]
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    name: Parallel Tests & Build
    
    strategy:
      matrix:
        node-version: [20]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: dhanpe_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: 📥 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🗄️ Setup test database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dhanpe_test
        run: |
          npx prisma migrate deploy --skip-generate
          npx prisma generate

      - name: 🧪 Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dhanpe_test
          NODE_ENV: test
        run: npm run test

      - name: 📊 Generate coverage report
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dhanpe_test
          NODE_ENV: test
        run: npm run test:coverage
        continue-on-error: true

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./backend/coverage
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

      - name: 🏗️ Build verification
        working-directory: ./backend
        run: npm run build
        continue-on-error: false

      - name: 📦 Check build output
        working-directory: ./backend
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not created"
            exit 1
          fi
          echo "✅ Build successful"

  # GATE: Fail if tests or build fail
  build-gate:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: failure()
    steps:
      - name: ❌ Build/Test gate failed
        run: |
          echo "❌ Tests or build verification failed"
          echo "   → Fix failing tests: npm run test"
          echo "   → Fix build errors: npm run build"
          exit 1
