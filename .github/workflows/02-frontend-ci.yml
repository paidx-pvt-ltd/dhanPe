name: Frontend CI

on:
  pull_request:
    branches: [develop, staging, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/02-frontend-ci.yml'
  push:
    branches: [develop, staging, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/02-frontend-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkmarx AST Github Action
        uses: Checkmarx/ast-github-action@c52fa63dbd4916520882e10456d66ff4dd7bf754
        with:
          base_uri: https://ind.ast.checkmarx.net
          cx_tenant: ama-partners
          cx_client_id: dhruv-integrations
          cx_client_secret: ${{ secrets.CX_CLIENT_SECRET }}
          project_name: manual-financeapp
          additional_params: --threshold "sast-critical=1; sast-high=1; sca-critical=1; iac-security-critical=1" --async

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Analyze
        working-directory: frontend
        run: flutter analyze

      - name: Run tests
        working-directory: frontend
        run: flutter test