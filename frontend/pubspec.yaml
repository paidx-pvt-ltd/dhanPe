name: dhanpe
description: "DhanPe - Secure Payment Application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0
  connectivity_plus: ^5.0.0

  # State Management
  provider: ^6.0.0
  get_it: ^7.5.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Authentication
  jwt_decoder: ^2.0.1

  # Payment Gateway
  razorpay_flutter: ^1.6.0  # Alternative, use Cashfree SDKs when available

  # Navigation & Routing
  go_router: ^12.0.0

  # UI Components
  cached_network_image: ^3.3.0
  shimmer: ^2.0.0
  expandable: ^5.0.1
  lottie: ^2.6.0

  # Validation
  email_validator: ^2.1.17

  # Date & Time
  intl: ^0.18.1

  # Logging & Analytics
  firebase_core: ^2.24.0
  firebase_analytics: ^10.7.0
  firebase_crashlytics: ^3.4.0

  # Utils
  uuid: ^3.0.7
  timeago: ^3.5.0

  # Certificate Pinning
  http_certificate_pinning: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
