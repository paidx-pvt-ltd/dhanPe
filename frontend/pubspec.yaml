name: dhanpe
description: "DhanPe - Secure Payment Application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking (use Dio as primary client)
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # State Management
  provider: ^6.1.2
  get_it: ^7.6.0

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Authentication
  jwt_decoder: ^2.0.1

  # Navigation & Routing
  go_router: ^12.1.3
  didit_sdk: ^3.1.0
  sendotp_flutter_sdk: ^0.0.2
  flutter_cashfree_pg_sdk: ^2.2.10+48
  url_launcher: ^6.3.1

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  expandable: ^5.0.1
  lottie: ^3.1.0

  # Validation
  email_validator: ^2.1.17

  # Date & Time
  intl: ^0.19.0

  # Utils
  uuid: ^4.3.3
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # TODO: Add custom fonts - download Poppins font from fonts.google.com
